.tab.on{color:#c8390a;border-bottom-color:#c8390a;font-weight:600}

function scoreRecord(r){
  const R1=r.risks_total===0||r.risks_no_owner===0;
  const R2=r.risks_total===0||r.risks_no_mit===0;
  const R3=r.days_since_report<=7;
  const R4=r.issues_total===0||r.issues_no_owner===0;
  const R5=r.issues_total===0||r.issues_no_plan===0;
  const R6=r.miles_total>0;
  const R7=r.miles_overdue===0;
  const R8=r.actions_total===0||r.actions_no_date===0;
  const R9=!!(r.okr&&r.okr.trim());
  const R10=!!(r.service_maturity&&r.service_maturity.trim());
  const passes=[R1,R2,R3,R4,R5,R6,R7,R8,R9,R10];
  return{passes,pct:Math.round(passes.filter(Boolean).length/10*100)};
}

function sc(p){return p>=80?'g':p>=60?'a':'r';}
function scLabel(p){return p>=80?'Compliant':p>=60?'Partial':'Non-Compliant';}
function ragDot(rag){
  const r=(rag||'').toLowerCase();
  if(r.includes('red'))return'rag-r';
  if(r.includes('amber'))return'rag-a';
  if(r.includes('blue'))return'rag-b';
  return'rag-g';
}
function getRuleDetail(r,i){
  const d=[
    r.risks_no_owner>0?`${r.risks_no_owner} risk(s) missing owner`:'',
    r.risks_no_mit>0?`${r.risks_no_mit} risk(s) missing mitigation`:'',
    r.days_since_report>=999?'No status report filed':`Last report ${r.days_since_report}d ago (>7d threshold)`,
    r.issues_no_owner>0?`${r.issues_no_owner} issue(s) missing owner`:'',
    r.issues_no_plan>0?`${r.issues_no_plan} issue(s) missing resolution plan`:'',
    r.miles_total===0?'No milestones defined':'',
    r.miles_overdue>0?`${r.miles_overdue} milestone(s) past LE date`:'',
    r.actions_no_date>0?`${r.actions_no_date} action(s) missing due date`:'',
    !r.okr||!r.okr.trim()?'OKR field not populated':'',
    !r.service_maturity||!r.service_maturity.trim()?'Service Maturity not populated':'',
  ];
  return d[i]||'';
}

const partial=scored.filter(x=>x.s.pct>=60&&x.s.pct<80).length;
const ok=scored.filter(x=>x.s.pct>=80).length;
const avg=Math.round(scored.reduce((a,x)=>a+x.s.pct,0)/scored.length);
const projects=RECORDS.filter(r=>r.type==='project').length;
const programs=RECORDS.filter(r=>r.type==='program').length;

const progComp=Math.round(scored.filter(x=>x.r.type==='program'&&x.s.pct>=80).length/Math.max(1,programs)*100);

function getFiltered(){
  const q=search.toLowerCase();
  return scored.filter(({r,s})=>{
    if(fType==='project'&&r.type!=='project')return false;
    if(fType==='program'&&r.type!=='program')return false;
    if(fStatus==='nc'&&s.pct>=60)return false;
    if(fStatus==='partial'&&(s.pct<60||s.pct>=80))return false;
    if(fStatus==='ok'&&s.pct<80)return false;
    if(fPillar!=='all'&&r.pillar!==fPillar)return false;
    if(q&&!r.name.toLowerCase().includes(q)&&!r.pm.toLowerCase().includes(q))return false;
    return true;
  });
}

    <button class="btn${fStatus==='all'?' on':''}" onclick="setFStatus('all')">All</button>
    <button class="btn${fStatus==='nc'?' on-a':''}" onclick="setFStatus('nc')">Non-Compliant</button>
    <button class="btn${fStatus==='partial'?' on-a':''}" onclick="setFStatus('partial')">Partial</button>
    <button class="btn${fStatus==='ok'?' on-g':''}" onclick="setFStatus('ok')">Compliant</button>
    <span style="width:8px"></span>
    <select class="psel" onchange="setPillar(this.value)">
      <option value="all"${fPillar==='all'?' selected':''}>All Pillars</option>
      ${pillars.map(p=>`<option value="${p}"${fPillar===p?' selected':''}>${p.replace('CIO \u2013 ','')}</option>`).join('')}
    </select>
    <input class="srch" type="text" placeholder="Search name or PM\u2026" value="${search}" oninput="setSearch(this.value)">
  </div>
  <div class="main">`;

  if(tab==='all'||tab==='nc'){
    const rows=(tab==='all'?filtered:ncFiltered);
    html+=`<div class="tblwrap"><table>
      <colgroup><col style="width:32px"><col style="width:56px"><col style="width:200px"><col style="width:140px"><col style="width:100px">${RULES.map(()=>'<col style="width:28px">').join('')}</colgroup>
      <thead><tr><th>#</th><th>Type</th><th>Name</th><th>PM / Owner</th><th>Score</th>${RULES.map(rule=>`<th title="${rule.label}">${rule.id}</th>`).join('')}</tr></thead>
      <tbody>`;
    if(!rows.length){html+=`<tr><td colspan="15"><div class="empty">No records match current filters</div></td></tr>`;}
    else{rows.forEach(({r,s},i)=>{
      const dot=ragDot(r.rag);
      const badge=r.type==='program'?'<span class="tb-prog">PROG</span>':'<span class="tb-proj">PROJ</span>';
      const scc=sc(s.pct);
      const fillC=scc==='g'?'fg':scc==='a'?'fa':'fr';
      const pctC=scc==='g'?'pg':scc==='a'?'pa':'pr';
      html+=`<tr onclick="openModal('${r.id}')">
        <td class="tid">${i+1}</td><td>${badge}</td>
        <td><div style="display:flex;align-items:center;gap:6px"><span class="rag-dot ${dot}"></span><span class="tname" title="${r.name}">${r.name}</span></div></td>
        <td class="tpm" title="${r.pm}">${r.pm}</td>
        <td><div class="sbwrap"><div class="sbar"><div class="sfill ${fillC}" style="width:${s.pct}%"></div></div><span class="sp ${pctC}">${s.pct}%</span></div></td>
        ${s.passes.map(p=>`<td class="${p?'r-pass':'r-fail'}">${p?'✓':'✗'}</td>`).join('')}
      </tr>`;})}
    html+=`</tbody></table></div>`;
    html+=`<div style="margin-top:8px;font-size:10px;color:#9ca3af;text-align:right">${rows.length} of ${RECORDS.length} records shown</div>`;
  }

  if(tab==='violations'){
    html+=`<div>`;
    ruleViol.forEach(({rule,ri,failing})=>{
      const allOk=failing.length===0;
      html+=`<div class="vigrp">
        <div class="vighd">
          <span style="background:#0f2518;color:#fff;border-radius:3px;padding:1px 6px;font-family:'Courier New',monospace;font-size:9px;font-weight:700">${rule.id}</span>
          <span style="font-size:11px;font-weight:600;color:#1a1a18">${rule.label}</span>
          ${allOk?'<span style="color:#22c55e;font-size:11px">\u2713 All compliant</span>':'<span style="color:#ef4444;font-size:11px">'+failing.length+' failing</span>'}
        </div>`;
      if(!allOk){failing.forEach((r,i)=>{
        const badge=r.type==='program'?'<span class="tb-prog" style="font-size:8px">PROG</span>':'<span class="tb-proj" style="font-size:8px">PROJ</span>';
        const det=getRuleDetail(r,ri);
        html+=`<div class="virow"><span class="vinum">${i+1}</span>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px">${badge}<span class="viname">${r.name}</span></div>
            <div class="vipm">${r.pm}</div>
            ${det?`<div class="vibadges"><span class="vibadge vb-r">${det}</span></div>`:''}
          </div></div>`;})}
      html+=`</div>`;
    });
    html+=`</div>`;
  }

  if(tab==='milestones'){
    const sorted=[...MILESTONES].sort((a,b)=>b.variance-a.variance);
    html+=`<div class="tblwrap"><table>
      <colgroup><col style="width:32px"><col style="width:160px"><col style="width:240px"><col style="width:90px"><col style="width:90px"><col style="width:80px"></colgroup>
      <thead><tr><th>#</th><th>Project / Program</th><th>Milestone</th><th>End Date</th><th>Status</th><th>Overdue</th></tr></thead>
      <tbody>`;
    sorted.forEach((m,i)=>{
      const vc=m.variance>60?'pr':m.variance>30?'pa':'pg';
      const sc2=m.status==='Delayed'?'#ef4444':m.status==='In Progress'?'#f59e0b':'#6b7280';
      html+=`<tr>
        <td class="tid">${i+1}</td>
        <td><div style="display:flex;align-items:center;gap:5px"><span class="rag-dot ${ragDot(m.rag)}"></span><span style="font-weight:500;font-size:11px">${m.project}</span></div></td>
        <td style="font-size:11px;color:#6b7280">${m.name}</td>
        <td style="font-family:'Courier New',monospace;font-size:10px;color:#6b7280">${m.end}</td>
        <td><span style="color:${sc2};font-size:10px;font-weight:600">${m.status}</span></td>
        <td><span class="sp ${vc}" style="font-weight:700">+${m.variance}d</span></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  if(tab==='analytics'){
    const rulePass=RULES.map((rule,ri)=>({label:rule.id,pct:Math.round(scored.filter(x=>x.s.passes[ri]).length/scored.length*100)}));
    const pillarData=pillars.map(p=>{
      const recs=scored.filter(x=>x.r.pillar===p);
      if(!recs.length)return null;
      const avgP=Math.round(recs.reduce((a,x)=>a+x.s.pct,0)/recs.length);
      return{p:p.replace('CIO \u2013 ',''),avgP,total:recs.length};
    }).filter(Boolean);
    html+=`<div>
      <div class="chart-row">
        <div class="chart-card">
          <div class="chart-title">Rule compliance pass rate (all 107 records)</div>
          <div style="display:grid;row-gap:6px">`;
    rulePass.forEach(({label,pct})=>{
      const fillC=pct>=80?'fg':pct>=60?'fa':'fr';
      const pctC=pct>=80?'pg':pct>=60?'pa':'pr';
      html+=`<div style="display:flex;align-items:center;gap:8px">
        <span style="font-family:'Courier New',monospace;font-size:9px;font-weight:700;color:#6b7280;min-width:22px">${label}</span>
        <div class="sbar" style="flex:1;height:8px"><div class="sfill ${fillC}" style="width:${pct}%"></div></div>
        <span class="sp ${pctC}" style="font-size:11px;font-weight:700">${pct}%</span>
      </div>`;
    });
    html+=`</div></div>
        <div class="chart-card">
          <div class="chart-title">Pillar average compliance</div>
          <div style="display:grid;row-gap:5px;max-height:280px;overflow-y:auto">`;
    pillarData.sort((a,b)=>a.avgP-b.avgP).forEach(({p,avgP,total})=>{
      const fillC=avgP>=80?'fg':avgP>=60?'fa':'fr';
      const pctC=avgP>=80?'pg':avgP>=60?'pa':'pr';
      html+=`<div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:9px;color:#6b7280;min-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${p}">${p}</span>
        <div class="sbar" style="flex:1;height:8px"><div class="sfill ${fillC}" style="width:${avgP}%"></div></div>
        <span class="sp ${pctC}" style="font-size:10px;font-weight:700">${avgP}%</span>
        <span style="font-size:9px;color:#9ca3af">(${total})</span>
      </div>`;
    });
    html+=`</div></div></div>
      <div class="chart-row">
        <div class="chart-card">
          <div class="chart-title">Compliance distribution — 107 records</div>
          <div style="display:flex;gap:16px;align-items:flex-end;height:140px;padding-bottom:24px">`;
    const buckets=[{label:'<60%\nNon-Compliant',count:nc,c:'fr',pc:'pr'},{label:'60–79%\nPartial',count:partial,c:'fa',pc:'pa'},{label:'≥80%\nCompliant',count:ok,c:'fg',pc:'pg'}];
    const maxBkt=Math.max(...buckets.map(b=>b.count));
    buckets.forEach(({label,count,c,pc})=>{
      const h=Math.round(count/maxBkt*100);
      html+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
        <span class="sp ${pc}" style="font-size:14px;font-weight:700">${count}</span>
        <div style="width:100%;height:${h}px;min-height:4px;border-radius:3px 3px 0 0" class="sfill ${c}"></div>
        <span style="font-size:9px;color:#6b7280;text-align:center;white-space:pre-line;line-height:1.2">${label}</span>
      </div>`;
    });
    html+=`</div></div>
        <div class="chart-card">
          <div class="chart-title">Bottom 10 — click to view detail</div>
          <div style="display:grid;row-gap:5px">`;
    const worst=scored.filter(x=>x.s.pct<80).sort((a,b)=>a.s.pct-b.s.pct).slice(0,10);
    worst.forEach(({r,s})=>{
      const scc=sc(s.pct);
      const fillC=scc==='g'?'fg':scc==='a'?'fa':'fr';
      const pctC=scc==='g'?'pg':scc==='a'?'pa':'pr';
      html+=`<div style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="openModal('${r.id}')">
        <span style="font-size:9px;color:#6b7280;min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${r.name}">${r.name}</span>
        <div class="sbar" style="flex:1;height:5px"><div class="sfill ${fillC}" style="width:${s.pct}%"></div></div>
        <span class="sp ${pctC}" style="font-size:10px;font-weight:700">${s.pct}%</span>
      </div>`;
    });
    html+=`</div></div></div></div>`;
  }

  html+=`</div>`;

  html+=`<div class="lgd">
    <div class="lgd-title">Compliance Rules Legend</div>
    <div class="lgd-grid">`;
  RULES.forEach(rule=>{html+=`<div class="lgd-item"><span class="lgd-num">${rule.id}</span><div><span class="lgd-label">${rule.label}</span><span class="lgd-desc">${rule.desc}</span></div></div>`;});
  html+=`</div>
    <div class="lgd-thr">
      <span class="thr-lbl">Thresholds:</span>
      <span style="color:#1a5c1e;font-size:10px;font-weight:600">\u25a0 Compliant \u226580%</span>
      <span style="color:#c07020;font-size:10px;font-weight:600">\u25a0 Partial 60\u201379%</span>
      <span style="color:#d64000;font-size:10px;font-weight:600">\u25a0 Non-Compliant &lt;60%</span>
    </div>
  </div>
  <div class="foot">Snapshot: 20 May 2026 \u00b7 107 records (90 projects, 17 programs) \u00b7 10 compliance rules \u00b7 Critical tier only \u00b7 NC:${nc} \u00b7 Partial:${partial} \u00b7 Compliant:${ok}</div>`;

  if(modal){
    const r=RECORDS.find(x=>x.id===modal);
    if(r){
      const{passes,pct:mpct}=scoreRecord(r);
      const badge=r.type==='program'?'<span class="tb-prog">PROGRAM</span>':'<span class="tb-proj">PROJECT</span>';
      html+=`<div class="modal-bg" onclick="closeModalBg(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-hdr">
            <div class="modal-hdr-l">${badge}<span class="modal-title">${r.name}</span><span class="mpct ${sc(mpct)}">${mpct}% \u00b7 ${scLabel(mpct)}</span></div>
            <button class="modal-cls" onclick="closeM()">\u2715</button>
          </div>
          <div class="modal-meta">
            <strong>${r.id}</strong> &nbsp;\u00b7&nbsp; PM: <strong>${r.pm}</strong> &nbsp;\u00b7&nbsp;
            RAG: <strong>${r.rag}</strong> &nbsp;\u00b7&nbsp;
            Risks: <strong>${r.risks_total}</strong> &nbsp;\u00b7&nbsp;
            Actions: <strong>${r.actions_total}</strong> &nbsp;\u00b7&nbsp;
            Issues: <strong>${r.issues_total}</strong> &nbsp;\u00b7&nbsp;
            Milestones: <strong>${r.miles_total}</strong>
            ${r.pillar?'&nbsp;\u00b7&nbsp; Pillar: <strong>'+r.pillar.replace('CIO \u2013 ','')+'</strong>':''}
          </div>
          <div class="modal-body">
            <div class="modal-rules">`;
      RULES.forEach((rule,i)=>{
        const p=passes[i];
        const det=p?'':getRuleDetail(r,i);
        html+=`<div class="mrule ${p?'p':'f'}">
          <div class="mri">${p?'\u2713':'\u2717'}</div>
          <div><div class="mrl"><span class="mrid">${rule.id}</span>${rule.label}</div>${!p&&det?`<div class="mrd">${det}</div>`:''}</div>
        </div>`;
      });
      html+=`</div></div></div></div>`;
    }
  }

  document.getElementById('app').innerHTML=html;
}

function setTab(t){tab=t;render();}
function setFType(v){fType=v;render();}
function setFStatus(v){fStatus=v;render();}
function setPillar(v){fPillar=v;render();}
function setSearch(v){search=v;render();}
function openModal(id){modal=id;render();}
function closeM(){modal=null;render();}
function closeModalBg(e){if(e.target.classList.contains('modal-bg')){modal=null;render();}}

render();
</script>

</body>
</html>
