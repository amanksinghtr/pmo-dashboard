# ── Netlify cache headers ──────────────────────────────────────────────────────
# index.html — never cached, always fetched fresh from Netlify CDN
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# pmo_data.json — never cached so dashboard always reads the latest export
[[headers]]
  for = "/pmo_data.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# All other assets (CSS, images etc) — cache for 1 hour
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
